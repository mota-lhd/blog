name: Sync from nanxiaobei/hugo-paper

# This workflow syncs non-merge commits from the upstream hugo-paper repository
# on/after a specified date, squashing them into a single commit for review.
# Uses efficient branch-based merging with automatic upstream preference.

on:
  workflow_dispatch:
    inputs:
      since_date:
        description: "Include commits after this date (YYYY-MM-DD)"
        required: true
        type: string

env:
  UPSTREAM_REPO: "nanxiaobei/hugo-paper"
  UPSTREAM_BRANCH: "main"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0

      - name: git/configure
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: git/fetch-upstream
        run: |
          git remote add upstream \
            "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          git remote set-url upstream \
            "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          git fetch upstream ${{ env.UPSTREAM_BRANCH }} --no-tags

      - name: git/get-anchor
        id: anchor
        run: |
          # Find the first non-merge commit on/after the since_date
          FIRST_COMMIT=$(git log upstream/${{ env.UPSTREAM_BRANCH }} \
            --since="${{ inputs.since_date }} 00:00:00" \
            --no-merges \
            --format="%H" | tail -1)

          # No commits since the date
          if [ -z "${FIRST_COMMIT}" ]; then
            echo "sha=" >> "$GITHUB_OUTPUT"
            echo "new=0" >> "$GITHUB_OUTPUT"
            echo "▶ No commits found on/after ${{ inputs.since_date }}"
            exit 0
          fi

          # Use the parent of the first commit as anchor
          # (or initial commit if no parent)
          ANCHOR=$(git rev-parse "${FIRST_COMMIT}^" 2>/dev/null || \
            git rev-list --max-parents=0 upstream/${{ env.UPSTREAM_BRANCH }})

          NEW=$(git rev-list --no-merges \
            "${ANCHOR}..upstream/${{ env.UPSTREAM_BRANCH }}" --count)
          echo "sha=${ANCHOR}" >> "$GITHUB_OUTPUT"
          echo "new=${NEW}" >> "$GITHUB_OUTPUT"
          echo "▶ Anchor: ${ANCHOR}"
          echo "▶ First commit on/after date: ${FIRST_COMMIT}"
          echo "▶ New non-merge commits on/after ${{ inputs.since_date }}: \
            ${NEW}"

      - name: exit
        if: steps.anchor.outputs.new == '0'
        run: |
          echo "✅ no new commits since ${{ inputs.since_date }}. skipping."

      - name: branch/new
        if: steps.anchor.outputs.new != '0'
        id: branch
        run: |
          SHORT=$(echo "${{ steps.anchor.outputs.sha }}" | cut -c1-7)
          NAME="chore/upstream-sync/${{ inputs.since_date }}-${SHORT}"
          git checkout -b "${NAME}"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"

      - name: branch/squash
        if: steps.anchor.outputs.new != '0'
        id: squash
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/${{ env.UPSTREAM_BRANCH }})
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"

          # Create temp branch with upstream commits since anchor
          git checkout -b temp-upstream upstream/${{ env.UPSTREAM_BRANCH }}
          git reset --hard ${{ steps.anchor.outputs.sha }}

          # Switch back to sync branch and merge with upstream preference
          git checkout -
          git merge temp-upstream --squash --strategy=recursive \
            -X theirs --allow-unrelated-histories

          # Commit the squashed changes
          git commit -m \
            "chore: sync ${{ env.UPSTREAM_REPO }} commits on/after \
            ${{ inputs.since_date }}"

          # Clean up temp branch
          git branch -D temp-upstream
          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: branch/push
        if: steps.anchor.outputs.new != '0' && steps.squash.outputs.status == 'ok'
        run: git push origin "${{ steps.branch.outputs.name }}"

      - name: changelog
        if: steps.anchor.outputs.new != '0' && steps.squash.outputs.status == 'ok'
        id: log
        run: |
          # Only include commits that were actually cherry-picked
          # (non-merge, on/after date)
          LOG=$(git log \
            --pretty=format:"- %h %s (%an, %ad)" \
            --date=short \
            --no-merges \
            --since="${{ inputs.since_date }} 00:00:00" \
            upstream/${{ env.UPSTREAM_BRANCH }} \
            | head -60)
          {
            echo "content<<EOF"
            echo "${LOG}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: pull-request
        if: steps.anchor.outputs.new != '0' && steps.squash.outputs.status == 'ok'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          # Create pull request using GitHub REST API
          TITLE="chore: sync ${{ env.UPSTREAM_REPO }} — non-merge commits \
            on/after ${{ inputs.since_date }}"
          BODY="## 🔄 Upstream sync from \`${{ env.UPSTREAM_REPO }}\`

          | | |
          |---|---|
          | **Since date** | \`${{ inputs.since_date }}\` (inclusive) |
          | **Upstream HEAD** | \`${{ steps.squash.outputs.upstream_sha }}\` |
          | **Merge type** | \`Squash (upstream preferred, branch-based)\` |

          ### 📋 Non-merge commits included

          ${{ steps.log.outputs.content }}

          > _Triggered manually via \`workflow_dispatch\`._"

          PR_RESPONSE=$(curl -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d @- << EOF
          {
            "title": "$TITLE",
            "body": "$BODY",
            "head": "${{ steps.branch.outputs.name }}",
            "base": "main"
          }
          EOF
          )

          # Check if PR was created successfully
          if echo "$PR_RESPONSE" | jq -e '.number' > /dev/null; then
            PR_NUMBER=$(echo "$PR_RESPONSE" | jq -r '.number')
            PR_URL=$(echo "$PR_RESPONSE" | jq -r '.html_url')
            echo "✅ Pull request created: $PR_URL"
          else
            echo "❌ Failed to create pull request"
            echo "Response: $PR_RESPONSE"
            exit 1
          fi
