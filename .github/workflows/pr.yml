name: "Pull-Request"

on:
  pull_request:
    types: [synchronize, opened, reopened]

permissions:
  contents: read

jobs:
  secrets:
    name: secrets/scan
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: trufflehog
      uses: trufflesecurity/trufflehog@17456f8c7d042d8c82c9a8ca9e937231f9f42e26
      with:
        extra_args: --results=verified,unknown

  changes:
    needs: secrets
    name: changes/detect
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      backend_dockerfile: ${{ steps.changes.outputs.backend_dockerfile }}
      backend_python: ${{ steps.changes.outputs.backend_python }}
      frontend: ${{ steps.changes.outputs.frontend }}
      frontend_dockerfile: ${{ steps.changes.outputs.frontend_dockerfile }}
      frontend_js: ${{ steps.changes.outputs.frontend_js }}
      actions: ${{ steps.changes.outputs.actions }}
    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: changes
      uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
      id: changes
      with:
        filters: .github/file_and_dir_filters.yml

  backend:
    needs: changes
    name: backend/scan
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: read
    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: dockerfile/scan
      uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32
      if: ${{ needs.changes.outputs.backend_dockerfile == 'true' }}
      with:
        output_format: cli
        output_file_path: console
        file: './backend/Dockerfile'
        framework: "dockerfile"
        quiet: true
    - name: codeql/init
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      if: ${{ needs.changes.outputs.backend_python == 'true' }}
      with:
        languages: python
        tools: linked
        build-mode: none
        config-file: ./.github/codeql/python-config.yml
    - name: codeql/analyze
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      if: ${{ needs.changes.outputs.backend_python == 'true' }}
      with:
        category: "/language:python"
    - name: docker/setup
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: docker/build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      with:
        context: './backend/'
        push: false
        tags: local/web:back
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker
    - name: image/scan
      id: backend_scan
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
      with:
        image: 'local/web:back'
        fail-build: true
        output-format: table
        severity-cutoff: high
        only-fixed: true

  frontend:
    needs: changes
    name: frontend/scan
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: read
    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: dockerfile/scan
      uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32
      if: ${{ needs.changes.outputs.frontend_dockerfile == 'true' }}
      with:
        output_format: cli
        output_file_path: console
        file: './frontend/Dockerfile'
        framework: "dockerfile"
        quiet: true
    - name: codeql/init
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      if: ${{ needs.changes.outputs.frontend_js == 'true' }}
      with:
        tools: linked
        languages: javascript-typescript
        build-mode: none
        config-file: ./.github/codeql/javascript-typescript-config.yml
    - name: codeql/analyze
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      if: ${{ needs.changes.outputs.frontend_js == 'true' }}
      with:
        category: "/language:javascript-typescript"
    - name: docker/setup
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: docker/build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      with:
        context: './frontend/'
        push: false
        tags: local/web:front
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker
    - name: image/scan
      id: frontend_scan
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
      with:
        image: 'local/web:front'
        fail-build: true
        output-format: table
        severity-cutoff: medium
        only-fixed: true

  actions:
    needs: changes
    name: actions/scan
    if: ${{ needs.changes.outputs.actions == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      security-events: read
    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        fetch-depth: 0
    - name: codeql/init
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      with:
        tools: linked
        languages: actions
        build-mode: none
        config-file: ./.github/codeql/actions-config.yml
    - name: codeql/analyze
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      with:
        category: "/language:actions"

  success:
    runs-on: ubuntu-slim
    needs: [backend, frontend, actions]
    if: always()
    steps:
      - run: |
          if [[ ("${{ needs.backend.result }}" != "success" && "${{ needs.backend.result }}" != "skipped") || \
                ("${{ needs.actions.result }}" != "success" && "${{ needs.actions.result }}" != "skipped") || \
                ("${{ needs.frontend.result }}" != "success" && "${{ needs.frontend.result }}" != "skipped") ]]; then
            echo "❌ Failed :( Please check frontend or backend !!"
            exit 1
          fi
          echo "✅ All good :)"
