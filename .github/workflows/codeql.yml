name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '13 13 * * *'

permissions:
  contents: read

jobs:
  docker:
    name: docker/scan/${{ matrix.docker_image }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        docker_image: [frontend, backend]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: docker/setup
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c
    - name: dockerfile/scan
      uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898
      with:
        output_format: cli,sarif
        output_file_path: console,results-${{ matrix.docker_image }}.sarif
        file: './${{ matrix.docker_image }}/Dockerfile'
        framework: "dockerfile"
        quiet: true
        soft_fail: true
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
      with:
        sarif_file: results-${{ matrix.docker_image }}.sarif
    - name: docker/build
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
      with:
        context: './${{ matrix.docker_image }}/'
        push: false
        tags: blog:${{ matrix.docker_image }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker
    - name: image/scan
      id: "scan"
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
      with:
        image: 'blog:${{ matrix.docker_image }}'
        fail-build: false
        output-format: sarif
        only-fixed: true
        add-cpes-if-none: true
        by-cve: true
        cache-db: true
        severity-cutoff: low
    - name: scan/upload
      uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}

  analyze:
    name: codeql/scan/${{ matrix.language }}
    runs-on: ubuntu-slim
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]

    steps:
    - name: checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
    - name: Initialize CodeQL
      uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e
      with:
        languages: ${{ matrix.language }}
        tools: linked
        build-mode: none
        config-file: ./.github/codeql/${{ matrix.language }}-config.yml
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a
      with:
        category: "/language:${{matrix.language}}"
