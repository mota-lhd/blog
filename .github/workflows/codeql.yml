name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '13 13 * * *'

permissions:
  contents: read

jobs:
  docker:
    name: docker/scan/${{ matrix.docker_image }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        docker_image: [frontend, backend]
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: docker/setup
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: dockerfile/scan
      uses: bridgecrewio/checkov-action@3203f966a7ccd680cd8f6aaa3c3c5b0b3e9afa32
      with:
        output_format: cli,sarif
        output_file_path: console,results-${{ matrix.docker_image }}.sarif
        file: './${{ matrix.docker_image }}/Dockerfile'
        framework: "dockerfile"
        quiet: true
        soft_fail: true
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      with:
        sarif_file: results-${{ matrix.docker_image }}.sarif
    - name: docker/build
      uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f
      with:
        context: './${{ matrix.docker_image }}/'
        push: false
        tags: blog:${{ matrix.docker_image }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker
    - name: image/scan
      id: "scan"
      uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2
      with:
        image: 'blog:${{ matrix.docker_image }}'
        fail-build: false
        output-format: sarif
        only-fixed: true
        add-cpes-if-none: true
        by-cve: true
        cache-db: true
        severity-cutoff: low
    - name: scan/upload
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}

  analyze:
    name: codeql/scan/${{ matrix.language }}
    runs-on: ubuntu-slim
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]

    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Initialize CodeQL
      uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      with:
        languages: ${{ matrix.language }}
        tools: linked
        build-mode: none
        config-file: ./.github/codeql/${{ matrix.language }}-config.yml
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225
      with:
        category: "/language:${{matrix.language}}"
