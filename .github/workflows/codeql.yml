name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '13 13 * * *'

permissions:
  contents: read

jobs:
  docker:
    name: docker/scan/${{ matrix.docker_image }}
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        docker_image: [frontend, backend]

    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: docker/setup
      uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd
    - name: dockerfile/scan
      uses: bridgecrewio/checkov-action@2fd3901c8feb52417f27f0d9800259a106c1ec1e
      with:
        output_format: cli,sarif
        output_file_path: console,results-${{ matrix.docker_image }}.sarif
        file: './${{ matrix.docker_image }}/Dockerfile'
        framework: "dockerfile"
        quiet: true
        soft_fail: true
    - name: Upload SARIF file
      uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8
      with:
        sarif_file: results-${{ matrix.docker_image }}.sarif
    - name: docker/build
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
      with:
        context: './${{ matrix.docker_image }}/'
        push: false
        tags: blog:${{ matrix.docker_image }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker
    - name: image/scan
      id: "scan"
      uses: anchore/scan-action@7037fa011853d5a11690026fb85feee79f4c946c
      with:
        image: 'blog:${{ matrix.docker_image }}'
        fail-build: false
        output-format: sarif
        only-fixed: true
        add-cpes-if-none: true
        by-cve: true
        cache-db: true
    - name: scan/upload
      uses: github/codeql-action/upload-sarif@b1bff81932f5cdfc8695c7752dcee935dcd061c8
      with:
        sarif_file: ${{ steps.scan.outputs.sarif }}

  analyze:
    name: codeql/scan/${{ matrix.language }}
    runs-on: ubuntu-slim
    permissions:
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions, javascript-typescript, python]

    steps:
    - name: checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Initialize CodeQL
      uses: github/codeql-action/init@b1bff81932f5cdfc8695c7752dcee935dcd061c8
      with:
        languages: ${{ matrix.language }}
        build-mode: none
        config-file: ./.github/codeql/${{ matrix.language }}-config.yml
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@b1bff81932f5cdfc8695c7752dcee935dcd061c8
      with:
        category: "/language:${{matrix.language}}"
